<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Toggle Scroll</title>
    <style>
      /* Tambahkan gaya dasar untuk halaman */
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        height: 200vh; /* Membuat halaman lebih tinggi agar bisa di-scroll */
      }

      .disable-scroll {
        overflow: hidden; /* Menonaktifkan scroll */
      }

      .toggle-btn {
        position: fixed;
        top: 20px;
        left: 20px;
        padding: 10px 20px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
      }

      .toggle-btn:active {
        background-color: #0056b3;
      }
    </style>
  </head>
  <body>
    <!-- Tombol untuk toggle scroll -->
    <button class="toggle-btn" onclick="toggleScroll()">Toggle Scroll</button>

    <!-- Konten halaman -->
    <div>
      <h1>Halaman dengan Toggle Scroll</h1>
      <p>
        Scroll halaman ini untuk melihat efek toggle scroll. Klik tombol di atas
        untuk menonaktifkan atau mengaktifkan scroll.
      </p>
      <p>Tambahkan konten di sini untuk mengisi halaman.</p>
    </div>

    <script>
      // Fungsi untuk men-toggle kelas 'disable-scroll'
      function toggleScroll() {
        document.body.classList.toggle("disable-scroll");
      }
    </script>
  </body>
</html>
